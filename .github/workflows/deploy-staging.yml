name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/company-lp/staging
            git pull origin develop || (git clone https://github.com/gdp-uno/company-lp.git . && git checkout develop)
            npm ci --production=false
            npm run build
            pm2 describe company-lp-staging > /dev/null 2>&1 \
              && pm2 restart company-lp-staging \
              || pm2 start npm --name "company-lp-staging" -- start -- -p 3001
            pm2 save
