name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/company-lp/production
            git pull origin main || (git clone https://github.com/gdp-uno/company-lp.git . && git checkout main)
            npm ci --production=false
            npm run build
            pm2 describe company-lp-production > /dev/null 2>&1 \
              && pm2 restart company-lp-production \
              || pm2 start npm --name "company-lp-production" -- start -- -p 3000
            pm2 save
